services:
  # Base de Datos Central
  db:
    image: postgres:16-alpine
    container_name: bombava_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: bombava_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bombava_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Motor de Juego (Backend)
  backend:
    build:
      context: ./BombaVa-Backend
      dockerfile: Dockerfile
    container_name: bombava_backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://admin:password123@db:5432/bombava_db
      JWT_SECRET: super_secret_test_key_123
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

  # Interfaz Web (Frontend)
  frontend-web:
    build:
      context: ./BombaVa-FrontendWeb/bombava-frontend
      dockerfile: ../../infrastructure/web.Dockerfile
    container_name: bombava_web
    ports:
      - "5173:5173"
    depends_on:
      - backend